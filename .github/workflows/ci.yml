name: CI

# ─────────────────────────────────────────────────────────────────────────────
#  Continuous integration — runs on every PR + every push to main.
#
#  Three parallel jobs: api (dotnet build + test), web (typecheck + lint +
#  format + build), bicep (compile-as-syntax-check). All must pass for the
#  PR to merge — wired into branch protection in the GitHub repo settings.
#
#  WHY THREE PARALLEL JOBS INSTEAD OF ONE SCRIPT?
#  ----------------------------------------------
#  Parallel = faster: api + web + bicep all run on dedicated runners
#  simultaneously. Also: each job's failure is independently reportable —
#  the GitHub UI shows "api ❌ web ✅ bicep ✅" instead of "CI failed"
#  with a wall of logs.
#
#  WHY NO DEPLOY STEPS?
#  --------------------
#  Deployments live in cd-staging.yml / cd-prod.yml (Phase 11). ci.yml is
#  build + test only — runs on every PR including from forks, where it
#  would be a security hole to expose deployment credentials.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel stale runs when new commits land on a PR — saves CI minutes and
# stops the "wait for the old failed run to finish first" cycle.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: this build-and-test workflow only reads the repo (it runs on
# PRs from forks and holds no deployment secrets). Caps GITHUB_TOKEN to read-only
# regardless of the repo/org default.
permissions:
  contents: read

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Backend · ASP.NET Core API
  # ───────────────────────────────────────────────────────────────────────────
  api:
    name: API · build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up .NET 10
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: '10.0.x'

      # NuGet cache speeds up restores from ~30s to ~3s on warm runs.
      # The cache key includes every csproj hash so a dependency change
      # busts the cache cleanly.
      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test (with coverage)
        # Runs the full xUnit suite in Release and collects line/branch coverage
        # via coverlet's XPlat collector (already referenced by both test
        # projects). TRX + cobertura land under ./TestResults.
        run: >
          dotnet test --no-build --configuration Release
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults

      - name: Coverage report + 85% line gate
        # Merges the per-project cobertura reports into one, surfaces the summary
        # in the GitHub job summary, and FAILS the build when line coverage drops
        # below 85% (currently ~95%). Branch coverage is reported, not gated.
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          export PATH="$PATH:$HOME/.dotnet/tools"
          reportgenerator \
            "-reports:./TestResults/**/coverage.cobertura.xml" \
            "-targetdir:./TestResults/coverage" \
            "-reporttypes:TextSummary;Html;MarkdownSummaryGithub"
          cat ./TestResults/coverage/Summary.txt
          cat ./TestResults/coverage/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY" || true
          line=$(grep -oP 'Line coverage:\s*\K[0-9.]+' ./TestResults/coverage/Summary.txt)
          echo "Measured line coverage: ${line}%"
          awk -v c="$line" 'BEGIN { exit (c + 0 >= 85 ? 0 : 1) }' \
            || { echo "::error::Line coverage ${line}% is below the 85% gate"; exit 1; }

      - name: Upload test results
        # Always upload, even on failure, so the .trx + HTML coverage report are
        # available for post-mortem in the GitHub Actions UI.
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: api-test-results
          path: |
            **/TestResults/*.trx
            TestResults/coverage/**
          if-no-files-found: ignore

  # ───────────────────────────────────────────────────────────────────────────
  # Frontend · Vite + React SPA
  # ───────────────────────────────────────────────────────────────────────────
  web:
    name: Web · typecheck + lint + build + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/web
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up pnpm
        # pnpm/action-setup installs the version pinned in package.json's
        # `packageManager` field (or a fallback). Setting up pnpm BEFORE
        # setup-node lets setup-node's cache-key resolution find the
        # right store path.
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 10

      - name: Set up Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: src/web/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Build
        run: pnpm build

      - name: Test (Vitest)
        # Unit + component tests (jsdom). Fast, hermetic — no browser, no API.
        run: pnpm test

  # ───────────────────────────────────────────────────────────────────────────
  # Frontend · Playwright end-to-end
  # ───────────────────────────────────────────────────────────────────────────
  #  A separate job: E2E needs a browser binary + a running web server, so it's
  #  slower than the static web checks and worth isolating (independent failure
  #  reporting, and it doesn't hold up the fast lint/build feedback). The suite
  #  is hermetic — every /api/v1 call is stubbed via Playwright route mocking —
  #  so no backend or database is required in CI.
  e2e:
    name: Web · E2E (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/web
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 10

      - name: Set up Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: src/web/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        # --with-deps pulls the OS libraries Chromium needs on the runner.
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E
        run: pnpm e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: src/web/playwright-report
          if-no-files-found: ignore

  # ───────────────────────────────────────────────────────────────────────────
  # Infrastructure · Bicep syntax check
  # ───────────────────────────────────────────────────────────────────────────
  bicep:
    name: Bicep · build (syntax check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      # `az` is preinstalled on ubuntu-latest; `az bicep install` is
      # idempotent + fast (downloads the bicep CLI into the az cache).
      - name: Install Bicep
        run: az bicep install

      # `bicep build` compiles to ARM JSON. Any syntax error, missing
      # parameter, or type mismatch surfaces as a non-zero exit. We don't
      # care about the ARM output (discarded); only the exit code.
      - name: Compile main.bicep
        run: |
          mkdir -p /tmp/bicep-out
          az bicep build --file infra/bicep/main.bicep --outdir /tmp/bicep-out

      - name: Compile each module
        # Today's main.bicep has every module reference commented out, so
        # `bicep build main.bicep` doesn't transitively check the modules.
        # We compile each module file individually to catch typos. The
        # `no-unused-params` lint rule is downgraded to Info in
        # infra/bicep/bicepconfig.json so placeholder modules don't spam
        # CI; real errors still fail the build.
        run: |
          for m in infra/bicep/modules/*.bicep; do
            echo "Compiling $m"
            az bicep build --file "$m" --outdir /tmp/bicep-out
          done

      - name: Compile bicepparam files
        run: |
          for paramfile in infra/bicep/env/*.bicepparam; do
            echo "Compiling $paramfile"
            az bicep build-params --file "$paramfile" --outfile "/tmp/bicep-out/$(basename "$paramfile" .bicepparam).parameters.json"
          done
