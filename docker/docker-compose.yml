# ─────────────────────────────────────────────────────────────────────────────
#  Local development stack: api + web + sqlserver + azurite.
#
#  Invocation (from repo root):
#    docker compose -f docker/docker-compose.yml --env-file .env up -d --build
#
#  The --env-file flag is REQUIRED because .env lives at repo root, not next
#  to this compose file. Without it, MSSQL_SA_PASSWORD etc. default to empty
#  strings and SQL Server refuses to boot ("password didn't meet complexity").
#
#  WHY THIS LIVES UNDER docker/ INSTEAD OF AT REPO ROOT
#  ---------------------------------------------------
#  Compose at the root is the path of least surprise — but PLAN.md §5 lays
#  out a docker/ folder that will eventually also host Service Bus emulator
#  + Functions host compositions (Phase 8). Keeping everything Docker-shaped
#  in one folder makes that addition a sibling file, not a root pollution.
#
#  WHY NOT `version:` AT THE TOP?
#  -----------------------------
#  Compose Spec dropped the `version` field as of v2 — it's now informational
#  only and emits a warning. Omitting it is the modern style.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ───────────────────────────────────────────────────────────────────────────
  # SQL Server 2022 — the relational store for Identity + domain entities.
  # ───────────────────────────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: retail-sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: 'Y'
      # SA password. Must satisfy SQL Server's complexity rule:
      # 8+ chars, mixed case, digit, symbol. Set in .env (see .env.example).
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      # Developer edition: free, full SQL Server features (NOT Express,
      # which has DB-size limits we'd hit in load testing).
      MSSQL_PID: Developer
    ports:
      - '1433:1433'
    volumes:
      - mssql-data:/var/opt/mssql
      # Optional bootstrap script — run manually after first boot:
      #   docker compose exec sqlserver /opt/mssql-tools18/bin/sqlcmd \
      #     -S localhost -U sa -P "$MSSQL_SA_PASSWORD" -C -i /init/init.sql
      # We do NOT auto-run it; EF migrations are the source of truth for
      # schema, and auto-running init.sql races with EF's own DB creation.
      - ./sql:/init:ro
    healthcheck:
      # Use sqlcmd from the 2022 image's mssql-tools18 path. -C trusts the
      # self-signed cert; -No disables strict encryption. exit 1 on any
      # non-zero so the healthcheck flips to "unhealthy" promptly.
      test:
        [
          'CMD-SHELL',
          '/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -No -Q "SELECT 1" || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ───────────────────────────────────────────────────────────────────────────
  # Azurite — Azure Storage emulator. Phase 4 uploads product images here;
  # Phase 8 will use it for Service Bus / Event Grid testing fixtures.
  # ───────────────────────────────────────────────────────────────────────────
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: retail-azurite
    restart: unless-stopped
    # Bind to all interfaces inside the container so the api service can
    # reach it on the docker network using the hostname "azurite".
    command:
      [
        'azurite',
        '--blobHost',
        '0.0.0.0',
        '--queueHost',
        '0.0.0.0',
        '--tableHost',
        '0.0.0.0',
        '--location',
        '/data',
        '--skipApiVersionCheck',
      ]
    ports:
      - '10000:10000' # blob
      - '10001:10001' # queue
      - '10002:10002' # table
    volumes:
      - azurite-data:/data

  # ───────────────────────────────────────────────────────────────────────────
  # ASP.NET Core API — Retail.Api.
  # Built from the multi-stage Dockerfile in docker/api/.
  # ───────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
    container_name: retail-api
    restart: unless-stopped
    depends_on:
      sqlserver:
        condition: service_healthy
      azurite:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      # ASP.NET Core's env-var config provider reads __ as a section
      # separator: ConnectionStrings__Default → ConnectionStrings:Default.
      # The hostname `sqlserver` resolves on the compose-default network.
      ConnectionStrings__Default: 'Server=sqlserver,1433;Database=RetailOms;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;'
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      # In containers there's no dotnet user-secrets store, so the dev
      # JWT key MUST come from env. The fail-fast in Program.cs throws if
      # this is empty — desirable: better than booting with a weak key.
      Jwt__Key: ${JWT_KEY}
    ports:
      - '5124:8080'
    healthcheck:
      # Mirrors the HEALTHCHECK in the Dockerfile but compose uses its own
      # — duplication is fine; compose's check drives `depends_on`
      # conditions for downstream services.
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:8080/health/live || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ───────────────────────────────────────────────────────────────────────────
  # Web (Vite dev server) — OPTIONAL in compose.
  # Most frontend devs prefer `cd src/web && pnpm dev` on the host (faster
  # HMR, no volume-mount quirks). This service is here so a full `compose
  # up` is enough for an onboarding demo or e2e parity check.
  # ───────────────────────────────────────────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: docker/web/Dockerfile.dev
    container_name: retail-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      # Vite reads this to print the right URL on the console.
      VITE_HOST: 0.0.0.0
    ports:
      - '5173:5173'
    volumes:
      # Live-mount source for HMR — edits on host trigger Vite reload in
      # the container.
      - ../src/web:/app
      # Anonymous volume protects /app/node_modules from being shadowed
      # by the host bind mount above (the host's lack of node_modules
      # would otherwise wipe out the container's installed deps).
      - /app/node_modules

volumes:
  mssql-data:
  azurite-data:

# No top-level `networks` block — compose auto-creates a default bridge
# network where every service resolves every other service by service
# name (sqlserver, azurite, api, web). Good enough for local dev.
